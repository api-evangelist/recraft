description: >-
  Recraft API uses prepaid API Units (1,000 units = $1.00). Each operation consumes a
  defined unit count: V4 Pro raster $0.25, V4 / V3 raster $0.04, V2 raster $0.022, V4 Pro
  Vector $0.30, V4 / V3 Vector $0.08, V2 Vector $0.044, plus editing operations like
  background removal $0.01 and upscaling Crisp $0.004 / Creative $0.25.
notes: Reconciled from Recraft API pricing reference (May 2026).
sources:
- https://www.recraft.ai/docs/api-reference/pricing
