aid: recraft
url: https://raw.githubusercontent.com/api-evangelist/recraft/refs/heads/main/apis.yml
name: Recraft
kind: company
description: >-
  Recraft is an AI design platform offering raster and vector image generation, image
  editing, inpainting, background removal/generation, vectorization, upscaling, and style
  creation. The Recraft API is REST-based at https://external.api.recraft.ai/v1, compatible
  with the OpenAI Python client, and uses prepaid API Units billed at 1,000 units = $1.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Image Generation
  - Design
  - Vector
  - Style
created: '2026-05-08'
modified: '2026-05-30'
specificationVersion: '0.19'
apis:
  - aid: recraft:platform
    name: Recraft API
    description: >-
      REST API for raster and vector image generation (V4 Pro / V4 / V3 / V2), inpainting,
      image-to-image, background replacement, style creation, vectorization, upscaling
      (Crisp / Creative), background removal, region erase, and image variation. Bearer
      token auth; Swagger at https://external.api.recraft.ai/doc/.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://www.recraft.ai/docs/api-reference/getting-started
    baseURL: https://external.api.recraft.ai/v1
