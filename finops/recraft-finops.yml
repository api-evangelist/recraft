specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Recraft
providerId: recraft
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- AI
- Image Generation
- Design
- Vector
- Style
- FinOps
- Cost Management
- FOCUS
description: >-
  FOCUS-aligned FinOps view of Recraft. Recraft uses prepaid API Units (1,000 units = $1)
  consumed per operation. Cost dominance comes from raster vs vector and version (V4 Pro is
  ~6x V4 cost). Editing operations are largely cheap ($0.004-$0.08); only Creative upscale
  matches V4 Pro pricing.
notes: Right-size model version per workload; reserve V4 Pro for hero assets only.
sources:
- https://www.recraft.ai/docs/api-reference/pricing
- https://www.recraft.ai/docs/api-reference/getting-started
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Recraft
serviceCategory: AI
billingModel:
  pricingCategory: Prepaid Credits + Per-Operation Usage
  billingFrequency: On Credit Purchase
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
  - Adjustment
focusColumns:
  ServiceName: Recraft API
  ServiceCategory: AI
  ProviderName: Recraft
  PublisherName: Recraft
  InvoiceIssuerName: Recraft
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: raster_generations
  description: Raster image generation (V2/V3/V4/V4 Pro).
  unit: image
  aggregation: sum
  dimensions:
  - account
  - model
- name: vector_generations
  description: Vector image generation (V2/V3/V4/V4 Pro Vector).
  unit: image
  aggregation: sum
  dimensions:
  - account
  - model
- name: edit_operations
  description: Image-to-image, inpainting, background replace, style creation, vectorize, bg-remove, upscale, region-erase.
  unit: image
  aggregation: sum
  dimensions:
  - account
  - operation
- name: api_units_purchased
  description: Prepaid API Unit purchases.
  unit: USD
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track unit drawdown by operation in Recraft profile.
- name: Allocation
  description: Tag generations to creative project / brand.
- name: Optimization
  description: Use V4 (not V4 Pro) for general work; reserve V4 Pro and Creative upscale for hero assets.
- name: Accountability
  description: Assign budget owners per creative team / brand.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
